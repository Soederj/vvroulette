<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Valhalla Vikings – Foodora-roulette</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@500;600;700;800&family=Alegreya+Sans:ital,wght@0,400;0,500;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --iron:#0B1017;
  --steel:#18222F;
  --steel-2:#223041;
  --steel-3:#2C3D53;
  --bone:#F0E7D2;
  --bone-dim:#B8AD93;
  --muted:#7A879C;
  --gold:#D4A94A;
  --gold-bright:#F2D179;
  --gold-deep:#8F6E1F;
  --blood:#93261F;
  --blood-bright:#C4392B;
  --line:rgba(212,169,74,.28);
  --shadow:0 12px 34px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
html,body{height:100%}
body{
  background:
    radial-gradient(1100px 560px at 50% -12%, #26374e 0%, transparent 58%),
    radial-gradient(800px 460px at 92% 108%, rgba(147,38,31,.22) 0%, transparent 60%),
    radial-gradient(700px 400px at 0% 100%, rgba(212,169,74,.07) 0%, transparent 55%),
    var(--iron);
  color:var(--bone);
  font-family:"Alegreya Sans",system-ui,sans-serif;
  min-height:100%;
  overflow-x:hidden;
  font-size:16px;
}
body::before{
  content:"ᚠ ᚢ ᚦ ᚨ ᚱ ᚲ ᚷ ᚹ ᚺ ᚾ ᛁ ᛃ ᛇ ᛈ ᛉ ᛋ ᛏ ᛒ ᛖ ᛗ ᛚ ᛜ ᛞ ᛟ ᚠ ᚢ ᚦ ᚨ ᚱ ᚲ";
  position:fixed;inset:0;
  font-size:62px;line-height:130px;letter-spacing:44px;
  color:rgba(240,231,210,.024);
  word-break:break-all;
  pointer-events:none;z-index:0;
  padding:24px;
}
#app{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:20px 16px 96px}

/* ---------- header ---------- */
header{text-align:center;margin-bottom:10px}
.h-runes{color:var(--gold);letter-spacing:16px;font-size:14px;opacity:.9}
h1{
  font-family:"Cinzel Decorative",serif;font-weight:900;
  font-size:clamp(28px,6.4vw,50px);
  line-height:1.03;margin:6px 0 4px;
  background:linear-gradient(180deg,#FBE7AC 0%, var(--gold-bright) 38%, var(--gold) 62%, #A57F26 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 3px 10px rgba(212,169,74,.35));
}
.subtitle{font-family:"Cinzel",serif;font-weight:700;color:var(--bone-dim);letter-spacing:4px;font-size:clamp(10px,2.6vw,13px);text-transform:uppercase}
.h-divider{width:180px;height:1px;margin:14px auto 4px;background:linear-gradient(90deg,transparent,var(--gold),transparent);position:relative}
.h-divider::after{content:"◆";position:absolute;top:-9px;left:50%;transform:translateX(-50%);color:var(--gold);font-size:11px}

/* ---------- saga progress ---------- */
.saga{display:flex;justify-content:center;gap:0;margin:16px auto 20px;flex-wrap:wrap;max-width:760px}
.saga .step{
  font-family:"Cinzel",serif;font-weight:700;font-size:10.5px;letter-spacing:1.2px;
  padding:7px 12px;color:var(--muted);
  background:rgba(24,34,47,.7);
  border:1px solid #2e3c52;border-right-width:0;
  position:relative;text-transform:uppercase;
}
.saga .step:first-child{border-radius:6px 0 0 6px}
.saga .step:last-child{border-radius:0 6px 6px 0;border-right-width:1px}
.saga .step.active{
  color:var(--iron);
  background:linear-gradient(180deg,var(--gold-bright),var(--gold));
  border-color:var(--gold);
  box-shadow:0 0 18px rgba(212,169,74,.45);
  z-index:1;
}
.saga .step.done{color:var(--gold);border-color:rgba(212,169,74,.5)}
.saga .step.done::after{content:" ✓"}

/* ---------- panels ---------- */
.panel{
  background:linear-gradient(180deg, rgba(34,48,65,.82), rgba(17,24,33,.94));
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:var(--shadow), inset 0 1px 0 rgba(240,231,210,.05);
  padding:22px 20px;margin-bottom:16px;
  position:relative;
}
.panel::before,.panel::after{
  content:"";position:absolute;width:14px;height:14px;pointer-events:none;
  border-color:var(--gold);border-style:solid;
}
.panel::before{top:7px;left:7px;border-width:2px 0 0 2px;border-radius:3px 0 0 0}
.panel::after{top:7px;right:7px;border-width:2px 2px 0 0;border-radius:0 3px 0 0}
.panel h2{
  font-family:"Cinzel",serif;font-weight:800;color:var(--gold-bright);
  font-size:clamp(17px,4vw,21px);letter-spacing:1.5px;margin-bottom:6px;text-align:center;text-transform:uppercase;
}
.panel .lead{text-align:center;color:var(--bone-dim);font-size:15px;margin-bottom:14px;line-height:1.45}

/* ---------- buttons ---------- */
button{font-family:inherit;cursor:pointer}
.btn{
  display:inline-block;border:1px solid rgba(255,235,180,.55);border-radius:9px;
  font-family:"Cinzel",serif;font-weight:800;letter-spacing:1.8px;
  padding:14px 28px;font-size:15px;
  color:#1a1206;
  background:linear-gradient(180deg,#F7DE96 0%, var(--gold) 55%, #A9822A 100%);
  box-shadow:0 4px 0 #6f5514, 0 10px 24px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.5);
  transition:transform .07s, box-shadow .07s, filter .15s;
  text-transform:uppercase;
}
.btn:hover{filter:brightness(1.06)}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 #6f5514, inset 0 1px 0 rgba(255,255,255,.4)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.blood{
  background:linear-gradient(180deg,#D4493A,#8A1F16);color:var(--bone);
  border-color:rgba(255,160,140,.4);
  box-shadow:0 4px 0 #430d08, 0 10px 24px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.18);
}
.btn.ghost{background:transparent;color:var(--bone-dim);box-shadow:none;border:1px solid #3a465a;font-size:13px;padding:10px 18px}
.btn.ghost:hover{color:var(--gold);border-color:var(--gold);filter:none}
.btn.small{font-size:12.5px;padding:10px 16px;letter-spacing:1.2px}
.center{text-align:center}

/* ---------- players ---------- */
.players{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:6px}
.player-card{
  min-width:150px;flex:1 1 150px;max-width:186px;
  background:linear-gradient(180deg,rgba(13,18,26,.85),rgba(9,13,19,.9));
  border:1px solid #2c3a50;border-radius:11px;
  padding:11px 12px;text-align:center;position:relative;
  transition:border-color .3s, box-shadow .3s, transform .3s;
}
.player-card.turn{border-color:var(--gold);box-shadow:0 0 22px rgba(212,169,74,.4), inset 0 0 14px rgba(212,169,74,.08);transform:translateY(-2px)}
.player-card.turn::before{
  content:"⚔";position:absolute;top:-11px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:var(--iron);font-size:11px;
  width:22px;height:22px;line-height:22px;border-radius:50%;
}
.player-card.done{border-color:rgba(90,150,85,.55)}
.player-card .pname{font-family:"Cinzel",serif;font-weight:800;color:var(--bone);font-size:15px;letter-spacing:.5px}
.player-card .epithet{font-style:italic;color:var(--muted);font-size:11.5px;margin-bottom:5px}
.player-card .result{color:var(--gold-bright);font-weight:700;font-size:13.5px;min-height:18px;line-height:1.25}
.player-card .result small{display:block;color:var(--bone-dim);font-weight:400;font-size:11px;margin-top:2px}
.player-card .waiting{color:#4d5b71;font-size:12.5px}
.mode-card:hover{border-color:var(--gold);box-shadow:0 0 22px rgba(212,169,74,.4);transform:translateY(-2px)}

/* ---------- wheel ---------- */
.wheel-zone{
  background:radial-gradient(circle at 50% 42%, rgba(212,169,74,.09), transparent 62%);
  border-radius:14px;padding:6px 0 2px;
}
.wheel-wrap{position:relative;width:min(86vw,450px);margin:6px auto 2px;user-select:none}
.wheel-wrap canvas{display:block;width:100%;height:auto;filter:drop-shadow(0 16px 30px rgba(0,0,0,.65))}
.pointer{
  position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  width:0;height:0;z-index:5;
  border-left:16px solid transparent;border-right:16px solid transparent;
  border-top:32px solid var(--gold-bright);
  filter:drop-shadow(0 4px 5px rgba(0,0,0,.8));
}
.pointer::before{
  content:"";position:absolute;top:-33px;left:-11px;
  border-left:11px solid transparent;border-right:11px solid transparent;
  border-top:22px solid var(--blood-bright);
}
.turn-banner{
  text-align:center;font-family:"Cinzel",serif;font-weight:800;font-size:clamp(16px,4.2vw,22px);
  color:var(--gold-bright);margin:4px 0 8px;letter-spacing:1px;min-height:28px;
}
.turn-banner .sub{display:block;font-family:"Alegreya Sans";font-weight:400;font-size:13.5px;color:var(--bone-dim);letter-spacing:0;font-style:italic;margin-top:2px}

/* ---------- restaurant list / menu editor ---------- */
.rest-list{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.rest-item{
  background:linear-gradient(180deg,rgba(13,18,26,.85),rgba(9,13,19,.9));
  border:1px solid #2c3a50;border-radius:11px;overflow:hidden;
  transition:border-color .25s;
}
.rest-item.open{border-color:var(--gold)}
.rest-item.off .rest-head{opacity:.42}
.rest-head{display:flex;align-items:center;gap:11px;padding:11px 13px;cursor:pointer}
.rest-head input[type=checkbox]{width:21px;height:21px;accent-color:var(--gold);flex-shrink:0;cursor:pointer}
.rest-head .rinfo{flex:1;min-width:0}
.rest-head .rname{font-weight:800;font-size:15.5px;color:var(--bone)}
.rest-head .badge{
  display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.8px;
  padding:2px 7px;border-radius:20px;margin-left:7px;vertical-align:2px;text-transform:uppercase;
}
.badge.ver{background:rgba(90,150,85,.18);color:#8FC98A;border:1px solid rgba(90,150,85,.5)}
.badge.est{background:rgba(212,169,74,.12);color:var(--gold);border:1px solid rgba(212,169,74,.4)}
.rest-head .rmeta{font-size:12px;color:var(--muted);margin-top:1px}
.rest-head .chev{color:var(--muted);font-size:13px;transition:transform .25s;flex-shrink:0}
.rest-item.open .chev{transform:rotate(180deg);color:var(--gold)}
.rest-body{display:none;padding:4px 14px 14px;border-top:1px dashed rgba(212,169,74,.22)}
.rest-item.open .rest-body{display:block}
.course-block{margin-top:11px}
.course-block .ctitle{
  font-family:"Cinzel",serif;font-weight:700;font-size:11.5px;letter-spacing:1.6px;
  color:var(--gold);text-transform:uppercase;margin-bottom:7px;
}
.chip-row{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--steel);border:1px solid #34435c;border-radius:20px;
  padding:5px 7px 5px 12px;font-size:13.5px;color:var(--bone);
}
.chip .x{
  width:18px;height:18px;border-radius:50%;border:none;
  background:rgba(196,57,43,.25);color:#EFA79D;font-size:11px;line-height:1;
  display:flex;align-items:center;justify-content:center;
}
.chip .x:hover{background:var(--blood-bright);color:#fff}
.add-dish{display:flex;gap:7px;margin-top:8px}
.add-dish input{
  flex:1;background:#0c1119;border:1px solid #2e3c52;border-radius:8px;
  color:var(--bone);padding:8px 11px;font-family:inherit;font-size:13.5px;min-width:0;
}
.add-dish input:focus{outline:none;border-color:var(--gold)}
.add-dish button{
  background:rgba(212,169,74,.14);border:1px solid rgba(212,169,74,.5);color:var(--gold);
  border-radius:8px;padding:0 14px;font-size:17px;font-weight:700;
}
.add-dish button:hover{background:var(--gold);color:var(--iron)}
.rest-actions{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
.rest-actions button{
  background:transparent;border:1px solid #3a465a;color:var(--bone-dim);
  border-radius:7px;padding:6px 12px;font-size:12px;
}
.rest-actions button:hover{color:var(--gold);border-color:var(--gold)}
.rest-actions button.danger:hover{color:#EFA79D;border-color:var(--blood-bright)}

/* ---------- modals ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(4,7,11,.85);z-index:50;
  display:flex;align-items:center;justify-content:center;padding:16px;
  animation:fadeIn .22s;backdrop-filter:blur(3px);
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
  background:linear-gradient(180deg,#26313f,#131a24);
  border:1px solid var(--gold);border-radius:14px;padding:22px;
  box-shadow:0 0 44px rgba(212,169,74,.25), var(--shadow);
}
.modal h3{font-family:"Cinzel",serif;color:var(--gold-bright);margin-bottom:12px;text-align:center;letter-spacing:1px}
.modal label{display:block;font-size:12.5px;color:var(--bone-dim);margin:11px 0 4px;font-weight:700;letter-spacing:.5px}
.modal input[type=text]{
  width:100%;background:#0c1119;border:1px solid #2e3c52;border-radius:8px;
  color:var(--bone);padding:10px 11px;font-family:inherit;font-size:14px;
}
.modal input[type=text]:focus{outline:none;border-color:var(--gold)}
.modal .row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;justify-content:center}

/* ---------- reveal ---------- */
.reveal{
  text-align:center;max-width:440px;width:100%;
  background:linear-gradient(180deg, rgba(45,58,77,.98), rgba(19,26,36,.99));
  border:2px solid var(--gold);border-radius:16px;padding:30px 24px 26px;
  box-shadow:0 0 70px rgba(212,169,74,.4), inset 0 1px 0 rgba(240,231,210,.1);
  animation:stoneRise .45s cubic-bezier(.2,1.4,.4,1);
  position:relative;overflow:hidden;
}
.reveal::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%, rgba(212,169,74,.16), transparent 55%);
  pointer-events:none;
}
@keyframes stoneRise{from{transform:translateY(70px) scale(.78);opacity:0}to{transform:none;opacity:1}}
.reveal .runes{color:var(--gold);letter-spacing:11px;font-size:13px;opacity:.85}
.reveal .oden{
  font-family:"Cinzel Decorative",serif;font-weight:900;font-size:22px;margin:9px 0 3px;
  background:linear-gradient(180deg,#FBE7AC,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;
}
.reveal .who{font-family:"Cinzel",serif;color:var(--bone-dim);font-size:13.5px;letter-spacing:1.2px;margin-bottom:13px}
.reveal .prize{
  font-family:"Cinzel",serif;font-weight:800;font-size:clamp(20px,5.5vw,29px);color:var(--bone);
  padding:16px 8px;margin:4px 0;line-height:1.2;
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);
}
.reveal .prize small{display:block;font-family:"Alegreya Sans";font-weight:700;font-size:13.5px;color:var(--gold);margin-top:6px;letter-spacing:1px}
.reveal .flavor{font-style:italic;color:var(--bone-dim);font-size:14px;margin:12px 6px 18px;line-height:1.4}

/* ---------- summary ---------- */
.summary-person{
  background:linear-gradient(180deg,rgba(13,18,26,.85),rgba(9,13,19,.9));
  border:1px solid #2c3a50;border-left:4px solid var(--gold);
  border-radius:11px;padding:13px 15px;margin-bottom:10px;
}
.summary-person .pname{font-family:"Cinzel",serif;font-weight:800;color:var(--gold-bright);font-size:16px}
.summary-person .pname .rank{font-size:11.5px;color:var(--bone-dim);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-left:6px}
.summary-person .epithet{font-style:italic;color:var(--muted);font-size:12px;margin-bottom:7px}
.summary-person ul{list-style:none}
.summary-person li{padding:3px 0;font-size:15px}
.summary-person li .tag{
  display:inline-block;width:82px;font-size:10.5px;font-weight:800;letter-spacing:1.2px;
  color:var(--gold);text-transform:uppercase;
}
.summary-person li .from{color:var(--muted);font-size:12px}
.order-group{
  background:rgba(147,38,31,.1);border:1px solid rgba(196,57,43,.4);
  border-left:4px solid var(--blood-bright);
  border-radius:11px;padding:13px 15px;margin-bottom:10px;
}
.order-group .rname{font-family:"Cinzel",serif;font-weight:800;color:#EDAB9F;font-size:15px;margin-bottom:5px;letter-spacing:.5px}
.order-group li{font-size:14.5px;padding:2.5px 0;list-style:none}
.order-group li b{color:var(--bone)}

/* ---------- misc ---------- */
.shake{animation:shake .5s}
@keyframes shake{
  0%,100%{transform:translate(0,0)}
  20%{transform:translate(-8px,3px)}40%{transform:translate(7px,-4px)}
  60%{transform:translate(-5px,-3px)}80%{transform:translate(4px,3px)}
}
.confetti{position:fixed;top:-24px;z-index:60;font-size:22px;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(112vh) rotate(760deg);opacity:.85}}
.footer-tools{position:fixed;bottom:12px;right:12px;z-index:40;display:flex;gap:8px}
.footer-tools button{
  background:rgba(24,34,47,.92);border:1px solid #3a465a;color:var(--bone-dim);
  border-radius:9px;padding:9px 13px;font-size:13px;backdrop-filter:blur(4px);
}
.footer-tools button:hover{color:var(--gold);border-color:var(--gold)}
.hidden{display:none !important}
.note{font-size:12.5px;color:var(--muted);text-align:center;margin-top:12px;font-style:italic;line-height:1.5}
.pool-info{
  text-align:center;font-size:12.5px;color:var(--muted);
  margin:2px 0 10px;
}
@media (prefers-reduced-motion: reduce){
  .shake,.reveal,.overlay,.confetti{animation:none}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="h-runes">ᚹ ᚨ ᛚ ᚺ ᚨ ᛚ ᛚ ᚨ</div>
    <h1>Valhalla Vikings</h1>
    <div class="subtitle">Foodora-roulette · Skrapan · Södermalm</div>
    <div class="h-divider"></div>
  </header>

  <div class="saga" id="saga"></div>

  <main id="stage"></main>
</div>

<div class="footer-tools">
  <button id="soundBtn" title="Ljud av/på">🔊 Ljud</button>
  <button id="resetBtn" title="Börja om">↺ Börja om</button>
</div>

<div id="modalRoot"></div>

<script>
"use strict";
/* =====================================================
   DATA
===================================================== */
const PLAYERS_BASE = [
  {id:"jonathan", name:"Jonathan", epithet:"den Järnstarke"},
  {id:"marcel",   name:"Marcel",   epithet:"Blodyxa"},

  {id:"matthew",  name:"Matthew",  epithet:"den Vittfarne"},

];

/* verified = meny hämtad från restaurangens egen sida / leveransapp.
   Övriga är kvalificerade uppskattningar – validera i fas III! */
const RESTAURANTS_BASE = [
  {id:"maethai", name:"Mae Thai Götgatan", cuisine:"Thai · Götgatan 85B", verified:true,
   mains:["Pad Thai","Pad See Ew","Pad Krapow (helig basilika)","Grön curry","Röd curry","Gul curry","Panang curry","Massaman curry","Orange Chicken","Khao Pad (stekt ris)","Larb Gai-sallad"],
   starters:["Friterade vårrullar","Kycklingspett med jordnötssås","Friterad kyckling sötsur","Pankokyckling med chilimajo","Tom Yum-soppa","Tom Kha-soppa"],
   desserts:["Friterad glass","Mango sticky rice"]},
  {id:"pong", name:"Pong Skrapan", cuisine:"Asiatiskt · Götgatan 78 (i Skrapan!)", verified:true,
   mains:["Sushi 11 bitar","Sushi 15 bitar","California Roll","Spicy Tuna Roll","Dragon Roll","Rainbow Roll","Pokébowl","Pad Thai","Gaeng Panaeng (panangcurry)","Pad Bai Grapao (stark basilikawok)","Khao Pad (stekt ris)"],
   starters:["Vårrullar","Dim sum","Misosoppa"],
   desserts:["Friterad banan med glass","Glass"]},
  {id:"viet", name:"Viet Kitchen", cuisine:"Vietnamesiskt · Götgatan 78 (i Skrapan!)", verified:false,
   mains:["Pho Bo (nudelsoppa biff)","Bun Bo Nam Bo","Banh Mi","Vietnamesisk curry med kyckling","Wokade risnudlar"],
   starters:["Färska sommarrullar (Goi Cuon)","Friterade vårrullar (Cha Gio)","Mangosallad"],
   desserts:["Friterad banan","Kokosdessert (Chè)"]},
  {id:"grek", name:"Grekisk Fastfood", cuisine:"Grekiskt · Medborgarplatsen 29", verified:true,
   mains:["Gyrostallrik (fläsk)","Gyrostallrik (kyckling)","Gyrosrulle i pita","Souvlakispett med pommes","Nötfärsbiffar med pommes & tzatziki","Halloumitallrik","Falafeltallrik"],

===================================================== */
let AC = null;
function ac(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function tick(){
  if(!S.sound) return;
  try{
    const c = ac(), o = c.createOscillator(), g = c.createGain();
    o.type="square"; o.frequency.value=1400+Math.random()*300;
    g.gain.setValueAtTime(.055,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.05);
    o.connect(g).connect(c.destination); o.start(); o.stop(c.currentTime+.06);
  }catch(e){}
}
function horn(){
  if(!S.sound) return;
  try{
    const c = ac(), t = c.currentTime;
    [110,164.8].forEach((f,i)=>{
      const o=c.createOscillator(), g=c.createGain(), lp=c.createBiquadFilter();
      o.type="sawtooth"; o.frequency.setValueAtTime(f*0.94,t);
      o.frequency.linearRampToValueAtTime(f,t+.25);
      lp.type="lowpass"; lp.frequency.value=900;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.2-(i*.06),t+.12);
      g.gain.setValueAtTime(.18-(i*.06),t+.8);
      g.gain.exponentialRampToValueAtTime(.001,t+1.6);
      o.connect(lp).connect(g).connect(c.destination);
      o.start(t); o.stop(t+1.7);
    });
  }catch(e){}
}

/* =====================================================
   WHEEL
===================================================== */
let wheelAnim = null;

function drawWheel(canvas, segments, rot){
  const dpr = window.devicePixelRatio||1;
  const cssW = canvas.clientWidth || 430;
  if(canvas.width !== Math.round(cssW*dpr)){ canvas.width = Math.round(cssW*dpr); canvas.height = Math.round(cssW*dpr); }
  const ctx = canvas.getContext("2d");
  const W = canvas.width, R = W/2;
  ctx.save();
  ctx.clearRect(0,0,W,W);
  ctx.translate(R,R);

  // iron rim
  const rimGrad = ctx.createLinearGradient(0,-R,0,R);
  rimGrad.addColorStop(0,"#3c434e"); rimGrad.addColorStop(.5,"#22262d"); rimGrad.addColorStop(1,"#31363f");
  ctx.beginPath(); ctx.arc(0,0,R-2*dpr,0,Math.PI*2);
  ctx.fillStyle=rimGrad; ctx.fill();
  // double gold band
  ctx.beginPath(); ctx.arc(0,0,R-6*dpr,0,Math.PI*2);
  ctx.strokeStyle="#D4A94A"; ctx.lineWidth=3.5*dpr; ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,R-13*dpr,0,Math.PI*2);
  ctx.strokeStyle="rgba(212,169,74,.55)"; ctx.lineWidth=1.4*dpr; ctx.stroke();

  const inner = R-18*dpr;
  const n = segments.length, seg = (Math.PI*2)/n;
  const big = n<=3;

  ctx.rotate(rot);
  for(let i=0;i<n;i++){
    const a0 = i*seg, a1 = a0+seg;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,inner,a0,a1); ctx.closePath();
    // wedge gradient for depth
    const mid = a0+seg/2;
    const wg = ctx.createRadialGradient(0,0,inner*0.18,0,0,inner);
    if(i%2===0){ wg.addColorStop(0,"#26364b"); wg.addColorStop(1,"#1B2635"); }
    else { wg.addColorStop(0,"#141c28"); wg.addColorStop(1,"#0E141D"); }
    if(n%2===1 && i===n-1){ wg.addColorStop(0,"#1e2b3c"); wg.addColorStop(1,"#151f2c"); }
    ctx.fillStyle = wg;
    ctx.fill();
    ctx.strokeStyle="rgba(212,169,74,.55)"; ctx.lineWidth=1.3*dpr; ctx.stroke();

    // label
    ctx.save();
    ctx.rotate(mid);
    ctx.textAlign="right"; ctx.textBaseline="middle";
    let label = segments[i].label;
    let fs;
    if(big){ fs = 46*dpr; ctx.fillStyle="#F2D179"; }
    else{
      const longest = Math.max(...segments.map(s=>s.label.length));
      fs = Math.min(16.5, Math.max(9.5, 235/longest)) * dpr;
      ctx.fillStyle="#F0E7D2";
    }
    ctx.font = (big? "800 " : "600 ") + fs + "px " + (big?"Cinzel":"'Alegreya Sans'") + ", serif";
    const maxLen = big?12 : Math.floor((inner*0.64)/(fs*0.48));
    if(label.length>maxLen) label = label.slice(0,maxLen-1)+"…";
    ctx.shadowColor="rgba(0,0,0,.65)"; ctx.shadowBlur=3*dpr; ctx.shadowOffsetY=1*dpr;
    ctx.fillText(label, inner-13*dpr, 0);
    ctx.restore();
  }
  ctx.restore();

  // rivets (static)
  ctx.save(); ctx.translate(R,R);
  for(let i=0;i<16;i++){
    const a = i*(Math.PI*2/16);
    const rg = ctx.createRadialGradient(
      Math.cos(a)*(R-9.5*dpr)-1*dpr, Math.sin(a)*(R-9.5*dpr)-1*dpr, .5*dpr,
      Math.cos(a)*(R-9.5*dpr), Math.sin(a)*(R-9.5*dpr), 3.4*dpr);
    rg.addColorStop(0,"#EFCB6B"); rg.addColorStop(1,"#6f5514");
    ctx.beginPath();
    ctx.arc(Math.cos(a)*(R-9.5*dpr), Math.sin(a)*(R-9.5*dpr), 3.2*dpr, 0, Math.PI*2);
    ctx.fillStyle=rg; ctx.fill();
  }
  // center boss
  const grad = ctx.createRadialGradient(-7*dpr,-7*dpr,2*dpr,0,0,36*dpr);
  grad.addColorStop(0,"#FBE7AC"); grad.addColorStop(.42,"#D4A94A"); grad.addColorStop(1,"#5d4712");
  ctx.beginPath(); ctx.arc(0,0,31*dpr,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
  ctx.strokeStyle="#3a2d0b"; ctx.lineWidth=2*dpr; ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,25*dpr,0,Math.PI*2);
  ctx.strokeStyle="rgba(58,45,11,.5)"; ctx.lineWidth=1*dpr; ctx.stroke();
  ctx.fillStyle="#241a05";
  ctx.font = "800 "+(23*dpr)+"px Cinzel, serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("ᛟ",0,2*dpr);
  ctx.restore();
}

function spinWheel(canvas, segments, onDone){
  if(wheelAnim) cancelAnimationFrame(wheelAnim);
  const n = segments.length, seg = (Math.PI*2)/n;
  const targetIdx = Math.floor(Math.random()*n);
  const offset = (0.18 + Math.random()*0.64) * seg;
  const pointerAngle = -Math.PI/2;
  const spins = 5 + Math.floor(Math.random()*3);
  const finalRot = pointerAngle - (targetIdx*seg + offset) - spins*Math.PI*2;
  const dur = 4300 + Math.random()*900;
  const start = performance.now();
  let lastIdx = -1;

  function frame(now){
    let t = Math.min(1,(now-start)/dur);
    const ease = 1 - Math.pow(1-t, 3.2);
    const rot = finalRot * ease;
    drawWheel(canvas, segments, rot);
    const norm = ((pointerAngle - rot) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
    const idx = Math.floor(norm/seg) % n;
    if(idx!==lastIdx){ if(lastIdx!==-1) tick(); lastIdx = idx; }
    if(t<1){ wheelAnim = requestAnimationFrame(frame); }
    else { wheelAnim=null; setTimeout(()=>onDone(targetIdx), 250); }
  }
  wheelAnim = requestAnimationFrame(frame);
}

function playerCards(getResult, turnIdx, order){
  const list = order || S.players;
  return `<div class="players">` + list.map((p,i)=>{
    const res = getResult(p,i);
    const isTurn = i===turnIdx;
    const done = res!==null && res!==undefined;
    return `<div class="player-card ${isTurn?"turn":""} ${done?"done":""}">
      <div class="pname">${esc(p.name)}</div>
      <div class="epithet">”${esc(p.epithet)}”</div>
      ${done? `<div class="result">${res}</div>` : (isTurn? `<div class="result" style="color:var(--gold)">Din tur!</div>` : `<div class="waiting">väntar…</div>`)}
    </div>`;
  }).join("") + `</div>`;
}

/* ---------- generic spin phase ---------- */
function renderSpinPhase({title, lead, poolInfo, segments, turnList, turnIdx, getResult, banner, onResult, prizeFrom, titleTop}){
  const p = turnList[turnIdx];
  stage.innerHTML = `
  <div class="panel">
    <h2>${title}</h2>
    <p class="lead">${lead}</p>
    <div class="wheel-zone">
      <div class="turn-banner">${banner(p)}</div>
      ${poolInfo?`<div class="pool-info">${poolInfo}</div>`:""}
      <div class="wheel-wrap">
        <div class="pointer"></div>
        <canvas id="wheel"></canvas>
      </div>
      <div class="center" style="margin:12px 0 16px">
        <button class="btn" id="spinBtn">⚡ Snurra ödeshjulet</button>
      </div>
    </div>
    ${playerCards(getResult, turnIdx, turnList)}
  </div>`;
  const canvas = document.getElementById("wheel");
  requestAnimationFrame(()=>drawWheel(canvas, segments, 0));
  const btn = document.getElementById("spinBtn");
  btn.onclick=()=>{
    btn.disabled=true;
    if(AC && AC.state==="suspended") AC.resume();
    spinWheel(canvas, segments, idx=>{
      const segObj = segments[idx];
      reveal({
        who: `${p.name} ”${p.epithet}”`,
        prize: segObj.label,
        from: prizeFrom ? prizeFrom(segObj) : null,
        titleTop,
        onClose: ()=> onResult(p, segObj)
      });
    });
  };
}

/* ---------- 1: ANTAL RÄTTER ---------- */
function renderCountPhase(){
  const segments = [{label:"1", value:1},{label:"2", value:2},{label:"3", value:3}];
  renderSpinPhase({
    title:"Fas I · Hur många rätter?",
    lead:"En rätt, två rätter… eller en kungamåltid med tre? Hjulet avgör.",
    segments,
    turnList:S.players, turnIdx:S.turn,
    getResult:p=> p.count? `${p.count} rätter <small>${COUNT_TITLES[p.count]}</small>`:null,
    banner:p=>`${esc(p.name)} snurrar om antal rätter<span class="sub">1 = krigare · 2 = jarl · 3 = kung av Valhall</span>`,
    titleTop:"NORNORNA HAR SPUNNIT",
    prizeFrom: s=> COUNT_DESC[s.value],
    onResult:(p,s)=>{
      p.count = s.value;
      if(S.turn < S.players.length-1){ S.turn++; }
      else {
        S.players.forEach(x=>{ if(x.count===3) x.extraChoice="båda"; if(x.count===1) x.extraChoice="ingen"; });
        const needChoice = S.players.filter(x=>x.count===2);
        if(needChoice.length){ S.phase=2; S.turn=0; }
        else { S.phase=3; }
      }
      render();
    }
  });
}

/* ---------- 2: FÖRRÄTT ELLER EFTERRÄTT ---------- */
function renderExtraChoicePhase(){
  const list = S.players.filter(p=>p.count===2);
  if(S.turn>=list.length){ S.phase=3; return render(); }
  const segments=[{label:"FÖRRÄTT",value:"förrätt"},{label:"EFTERRÄTT",value:"efterrätt"}];
  renderSpinPhase({
    title:"Fas II · Ödesvalet",
    lead:"Ni som fick två rätter: ska den andra rätten vara förrätt eller efterrätt?",
    segments,
    turnList:list, turnIdx:S.turn,
    getResult:p=> p.extraChoice && p.extraChoice!=="ingen" && p.extraChoice!=="båda" ? esc(p.extraChoice.toUpperCase()) : null,
    banner:p=>`${esc(p.name)} snurrar: förrätt eller efterrätt?`,
    titleTop:"ÖDET ÄR RISTAT",
    onResult:(p,s)=>{
      p.extraChoice = s.value;
      if(S.turn < list.length-1){ S.turn++; } else { S.phase=3; }
      render();
    }
  });
}

    <h2>Fas III · Härens jaktmarker</h2>
    <p class="lead">Bocka i vilka restauranger som är med i lottningen, och <b>klicka på en rad för att granska & redigera menyn</b>.<br>
    <span style="font-size:13px;color:var(--muted)">Öppna Foodora/Wolt bredvid: stryk stängda ställen och sådana med hög frakt, rätta rätter som inte stämmer.</span></p>
    <div class="rest-list" id="restList"></div>
    <div class="center" style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn ghost" id="addRest">+ Lägg till restaurang</button>
      <button class="btn" id="goSpin">🛶 Menyerna är validerade – lotta!</button>
    </div>
  </div>`;
  const listEl = document.getElementById("restList");
  const openSet = new Set();

  function courseBlock(r, key, title){
    const items = r[key];
    return `<div class="course-block" data-key="${key}">
      <div class="ctitle">${title} · ${items.length} st</div>
      <div class="chip-row">
        ${items.map((d,i)=>`<span class="chip">${esc(d)}<button class="x" data-i="${i}" title="Ta bort">✕</button></span>`).join("") || `<span style="color:var(--muted);font-size:13px;font-style:italic">– tomt –</span>`}
      </div>
      <div class="add-dish">
        <input type="text" placeholder="Lägg till ${title.toLowerCase()}…">
        <button title="Lägg till">+</button>
      </div>
    </div>`;
  }

  function paint(){
    listEl.innerHTML = S.restaurants.map(r=>{
      const on = S.active.includes(r.id);
      const open = openSet.has(r.id);
      return `<div class="rest-item ${on?"":"off"} ${open?"open":""}" data-id="${r.id}">
        <div class="rest-head">
          <input type="checkbox" ${on?"checked":""}>
          <div class="rinfo">
            <div class="rname">${esc(r.name)}<span class="badge ${r.verified?"ver":"est"}">${r.verified?"verifierad":"uppskattad"}</span></div>
            <div class="rmeta">${esc(r.cuisine||"")} · ${r.mains.length} huvud · ${r.starters.length} för · ${r.desserts.length} efter</div>
          </div>
          <span class="chev">▼</span>
        </div>
        <div class="rest-body">
          ${courseBlock(r,"mains","Huvudrätter")}
          ${courseBlock(r,"starters","Förrätter")}
          ${courseBlock(r,"desserts","Efterrätter")}
          <div class="rest-actions">
            <button class="rename">✎ Byt namn</button>
            <button class="danger delete">🗑 Ta bort restaurang</button>
          </div>
        </div>
      </div>`;
    }).join("");

    listEl.querySelectorAll(".rest-item").forEach(item=>{
      const id = item.dataset.id;
      const r = restById(id);
      const head = item.querySelector(".rest-head");
      const cb = head.querySelector("input");

      cb.onclick = e=> e.stopPropagation();
      cb.onchange = e=>{
        if(e.target.checked){ if(!S.active.includes(id)) S.active.push(id); }
        else S.active = S.active.filter(x=>x!==id);
        save(); paint();
      };
      head.onclick = ()=>{
        if(openSet.has(id)) openSet.delete(id); else openSet.add(id);
        paint();
      };

      item.querySelectorAll(".course-block").forEach(block=>{
        const key = block.dataset.key;
        block.querySelectorAll(".x").forEach(x=>{
          x.onclick = e=>{
            e.stopPropagation();
            r[key].splice(parseInt(x.dataset.i),1);
            save(); paint();
          };
        });
        const input = block.querySelector("input");
        const addBtn = block.querySelector(".add-dish button");
        function add(){
          const v = input.value.trim();
          if(!v) return;
          r[key].push(v);
          save(); paint();
          // återöppna & fokusera samma fält
          const again = listEl.querySelector(`.rest-item[data-id="${id}"] .course-block[data-key="${key}"] input`);
          if(again) again.focus();
        }
        addBtn.onclick = e=>{ e.stopPropagation(); add(); };
        input.onkeydown = e=>{ if(e.key==="Enter"){ e.preventDefault(); add(); } };
        input.onclick = e=> e.stopPropagation();
      });

      item.querySelector(".rename").onclick = e=>{
        e.stopPropagation();
        const nn = prompt("Nytt namn:", r.name);
        if(nn && nn.trim()){ r.name = nn.trim(); save(); paint(); }
      };
      item.querySelector(".delete").onclick = e=>{
        e.stopPropagation();
        if(confirm("Ta bort "+r.name+"?")){
          S.restaurants = S.restaurants.filter(x=>x.id!==r.id);
          S.active = S.active.filter(x=>x!==r.id);
          openSet.delete(r.id);
          save(); paint();
        }
      };
    });
  }
  paint();

  document.getElementById("addRest").onclick=()=>{
    const ov = el(`<div class="overlay">
      <div class="modal">
        <h3>Ny restaurang</h3>
        <label>Namn</label><input type="text" id="rn" placeholder="t.ex. Falafelbaren">
        <label>Typ av kök (valfritt)</label><input type="text" id="rc" placeholder="t.ex. Libanesiskt">
        <div class="row">
          <button class="btn small" id="saveR">Lägg till</button>
          <button class="btn ghost small" id="cancelR">Avbryt</button>
        </div>
        <p class="note">Rätterna lägger du sedan till direkt i listan.</p>
      </div>
    </div>`);
    ov.querySelector("#saveR").onclick=()=>{
      const name = ov.querySelector("#rn").value.trim();
      if(!name){ ov.querySelector("#rn").focus(); return; }
      const r = {id:"r"+Date.now(), name, cuisine:ov.querySelector("#rc").value.trim(), verified:false, mains:[], starters:[], desserts:[]};
      S.restaurants.push(r); S.active.push(r.id);
      save(); ov.remove(); paint();
    };
    ov.querySelector("#cancelR").onclick=()=>ov.remove();
    modalRoot.appendChild(ov);
    setTimeout(()=>ov.querySelector("#rn").focus(),50);
  };

  document.getElementById("goSpin").onclick=()=>{
    const rs = activeRests();
    if(rs.length<2){ alert("Välj minst två restauranger – annars blir det ingen spänning!"); return; }
    const empty = rs.filter(r=>r.mains.length===0);
    if(empty.length){ alert("Dessa saknar huvudrätter: "+empty.map(r=>r.name).join(", ")+". Lägg till rätter eller bocka ur dem."); return; }
    S.phase=4; S.turn=0; render();
  };
}

/* ---------- 4: STRIDSPLAN (läge) + RESTAURANGSNURR ---------- */
function renderModeChoice(){
  stage.innerHTML = `
  <div class="panel">
    <h2>Fas III · Stridsplanen</h2>
    <p class="lead">Hur ska hären anfalla? Välj – eller låt ödet bestämma även detta.</p>
    <div class="players" style="align-items:stretch">
      <div class="player-card mode-card" id="modeInd" style="max-width:270px;flex:1 1 240px;cursor:pointer;padding:16px 14px">
        <div class="pname" style="font-size:17px">🛡 Varsitt ställe</div>
        <div class="epithet" style="margin:6px 0 0;font-size:13px">Var och en snurrar fram sin egen restaurang. Fem räder – ett festbord.</div>
      </div>
      <div class="player-card mode-card" id="modeShared" style="max-width:270px;flex:1 1 240px;cursor:pointer;padding:16px 14px">
        <div class="pname" style="font-size:17px">🍖 Gemensamt långbord</div>
        <div class="epithet" style="margin:6px 0 0;font-size:13px">Ett enda snurr avgör restaurangen för hela hären. Alla rätter lottas därifrån.</div>
      </div>
    </div>
    <div class="center" style="margin-top:18px">
      <button class="btn ghost" id="modeFate">🎲 Vi vet inte – låt ödeshjulet avgöra!</button>
    </div>
  </div>`;
  document.getElementById("modeInd").onclick=()=>{ S.mode="individual"; S.turn=0; render(); };
  document.getElementById("modeShared").onclick=()=>{ S.mode="shared"; S.turn=0; render(); };
  document.getElementById("modeFate").onclick=()=>{
    const segments=[{label:"VARSITT",value:"individual"},{label:"GEMENSAMT",value:"shared"}];
    stage.innerHTML = `
    <div class="panel">
      <h2>Fas III · Stridsplanen</h2>
      <p class="lead">Ödeshjulet avgör: varsitt ställe eller gemensamt långbord?</p>
      <div class="wheel-zone">
        <div class="turn-banner">Hela hären håller andan…</div>
        <div class="wheel-wrap">
          <div class="pointer"></div>
          <canvas id="wheel"></canvas>
        </div>
        <div class="center" style="margin:12px 0 8px">
          <button class="btn" id="spinBtn">⚡ Snurra ödeshjulet</button>
        </div>
      </div>
    </div>`;
    const canvas = document.getElementById("wheel");
    requestAnimationFrame(()=>drawWheel(canvas, segments, 0));
    const btn = document.getElementById("spinBtn");
    btn.onclick=()=>{
      btn.disabled=true;
      if(AC && AC.state==="suspended") AC.resume();
      spinWheel(canvas, segments, idx=>{
        const s = segments[idx];
        reveal({
          who:"Valhalla Vikings – hela hären",
          prize: s.value==="shared"?"GEMENSAMT LÅNGBORD":"VARSITT STÄLLE",
          from: s.value==="shared"?"Ett ställe. En order. Ett brödraskap.":"Fem räder mot fem mathallar.",
          titleTop:"STRIDSPLANEN ÄR LAGD",
          onClose:()=>{ S.mode=s.value; S.turn=0; render(); }
        });
      });
    };
  };
}

function renderRestSpin(){
  if(!S.mode) return renderModeChoice();
  const rests = activeRests();
  const segments = rests.map(r=>({label:shortName(r.name), value:r.id}));

  if(S.mode==="shared"){
    const crew = [{id:"all", name:"Hela hären", epithet:"Valhalla Vikings"}];
    renderSpinPhase({
      title:"Fas III · Långbordets mathall",
      lead:"Ett enda snurr. En restaurang för hela hären – alla rätter lottas härifrån.",
      segments,
      turnList:crew, turnIdx:0,
      getResult:()=>null,
      banner:()=>`Hela hären snurrar tillsammans<span class="sub">${rests.length} jaktmarker på hjulet · en utses</span>`,
      titleTop:"LÅNGBORDET ÄR DUKAT",
      prizeFrom:s=> restById(s.value)?.cuisine || "",
      onResult:(x,s)=>{
        S.players.forEach(p=>{ p.restaurant = s.value; });
        S.phase=5; S.turn=0;
        render();
      }
    });
    return;
  }

  renderSpinPhase({
    title:"Fas III · Vilken mathall plundras?",
    lead:"Var och en snurrar fram sin restaurang. Huvudrätten hämtas härifrån.",
    segments,
    turnList:S.players, turnIdx:S.turn,
    getResult:p=> p.restaurant? esc(shortName(restById(p.restaurant)?.name||"")) : null,
    banner:p=>`${esc(p.name)} snurrar fram sin restaurang<span class="sub">${rests.length} jaktmarker på hjulet</span>`,
    titleTop:"KORPARNA HAR SPANAT",
    prizeFrom:s=> restById(s.value)?.cuisine || "",
    onResult:(p,s)=>{
      p.restaurant = s.value;
      if(S.turn < S.players.length-1){ S.turn++; }
      else { S.phase=5; S.turn=0; }
      render();
    }
  });
}

/* ---------- 5: HUVUDRÄTT ---------- */
function renderMainSpin(){
  const p = S.players[S.turn];
  const r = restById(p.restaurant);
  const segments = r.mains.map(m=>({label:m, value:m}));
  if(segments.length===0){ p.main="(meny saknas – välj fritt!)"; advanceMain(); return; }
  renderSpinPhase({
    title:"Fas IV · Huvudrätten",
    lead:"Hjulet visar menyn från just din restaurang. Ingen ånger. Inga byten.",
    segments,
    turnList:S.players, turnIdx:S.turn,
    getResult:x=> x.main? `${esc(x.main)} <small>${esc(shortName(restById(x.restaurant)?.name||""))}</small>`:null,
    banner:x=>`${esc(x.name)} snurrar huvudrätt<span class="sub">från ${esc(r.name)}</span>`,
    titleTop:"BYTET ÄR FÄLLT",
    prizeFrom:()=> r.name,
    onResult:(x,s)=>{ x.main=s.value; advanceMain(); }
  });
}
function advanceMain(){
  if(S.turn < S.players.length-1){ S.turn++; }
  else {
    S.extraQueue = [];
    S.players.forEach(p=>{
      if(p.count===3){ S.extraQueue.push({pid:p.id,type:"förrätt",restId:null}); S.extraQueue.push({pid:p.id,type:"efterrätt",restId:null}); }
      else if(p.count===2 && (p.extraChoice==="förrätt"||p.extraChoice==="efterrätt")){ S.extraQueue.push({pid:p.id,type:p.extraChoice,restId:null}); }
    });
    S.extraTurn=0;
    S.phase = S.extraQueue.length? 6 : 7;
  }
  render();
}

/* ---------- 6: FÖR-/EFTERRÄTTER (två steg: restaurang → rätt) ---------- */
function extraTurnList(){
  return S.extraQueue.map(q=>{
    const pl = S.players.find(pp=>pp.id===q.pid);
    return {...pl, _q:q};
  });
}
function extraResult(x){
  const q = x._q;
  const done = q.type==="förrätt"? x.starter : x.dessert;
  const doneRest = q.type==="förrätt"? x.starterRest : x.dessertRest;
  if(done) return `${esc(done)} <small>${esc(q.type)} · ${esc(shortName(doneRest||""))}</small>`;
  if(q.restId) return `<small style="color:var(--gold)">→ ${esc(shortName(restById(q.restId)?.name||""))}…</small>`;
  return null;
}
function renderExtraSpin(){
  if(S.extraTurn>=S.extraQueue.length){ S.phase=7; return render(); }
  const q = S.extraQueue[S.extraTurn];
  const p = S.players.find(x=>x.id===q.pid);
  const key = q.type==="förrätt" ? "starters" : "desserts";
  const catLabel = q.type==="förrätt" ? "förrätter" : "efterrätter";

  // restauranger som hären fått + som har rätter i kategorin
  const candidates = assignedRestIds().map(restById).filter(r=>r && r[key].length>0);

  if(candidates.length===0){
    p[q.type==="förrätt"?"starter":"dessert"] = "(inga alternativ – lägg till i menyerna!)";
    p[q.type==="förrätt"?"starterRest":"dessertRest"] = "";
    S.extraTurn++; return render();
  }

  const turnList = extraTurnList();

  if(!q.restId){
    // STEG 1: snurra restaurang
    if(candidates.length===1){
      q.restId = candidates[0].id; save();
      return renderExtraSpin();
    }
    const segments = candidates.map(r=>({label:shortName(r.name), value:r.id}));
    renderSpinPhase({
      title:`Fas V · ${q.type==="förrätt"?"Förrätterna":"Efterrätterna"} – steg 1 av 2`,
      lead:`Först: <b>vilken av härens restauranger</b> ska ${q.type}en komma från? Endast ställen där någon fått sin huvudrätt är med.`,
      segments,
      turnList, turnIdx:S.extraTurn,
      getResult:extraResult,
      banner:x=>`${esc(p.name)} snurrar restaurang för sin ${q.type}<span class="sub">${candidates.length} av härens restauranger har ${catLabel}</span>`,
      titleTop:"HALLEN ÄR UTSEDD",
      prizeFrom:s=> restById(s.value)?.cuisine || "",
      onResult:(x,s)=>{ q.restId = s.value; render(); }
    });
  } else {
    // STEG 2: snurra rätt från vald restaurang
    const r = restById(q.restId);
    const segments = r[key].map(d=>({label:d, value:d}));
    renderSpinPhase({
      title:`Fas V · ${q.type==="förrätt"?"Förrätterna":"Efterrätterna"} – steg 2 av 2`,
      lead:`Nu: vilken ${q.type} från <b>${esc(r.name)}</b> blir det?`,
      segments,
      turnList, turnIdx:S.extraTurn,
      getResult:extraResult,
      banner:x=>`${esc(p.name)} snurrar ${q.type}<span class="sub">från ${esc(r.name)} · ${segments.length} rätter på hjulet</span>`,
      titleTop: q.type==="förrätt"?"FÖRSPELET ÄR VALT":"SÖTMAN ÄR BESTÄMD",
      prizeFrom:()=> r.name,
      onResult:(x,s)=>{
        p[q.type==="förrätt"?"starter":"dessert"] = s.value;
        p[q.type==="förrätt"?"starterRest":"dessertRest"] = r.name;
        S.extraTurn++;
        render();
      }
    });
  }
}

/* ---------- 7: SUMMERING ---------- */
function renderSummary(){
  const personHtml = S.players.map(p=>{
    const r = restById(p.restaurant);
    return `<div class="summary-person">
      <div class="pname">${esc(p.name)}<span class="rank">${COUNT_TITLES[p.count]||""}</span></div>
      <div class="epithet">”${esc(p.epithet)}” · ${p.count} rätt${p.count>1?"er":""}</div>
      <ul>
        ${p.starter?`<li><span class="tag">Förrätt</span> ${esc(p.starter)} <span class="from">(${esc(p.starterRest||"")})</span></li>`:""}
        <li><span class="tag">Huvudrätt</span> <b>${esc(p.main||"")}</b> <span class="from">(${esc(r?r.name:"")})</span></li>
        ${p.dessert?`<li><span class="tag">Efterrätt</span> ${esc(p.dessert)} <span class="from">(${esc(p.dessertRest||"")})</span></li>`:""}
      </ul>
    </div>`;
  }).join("");

  const orders = {};
  function add(rest, txt){ if(!rest) return; (orders[rest]=orders[rest]||[]).push(txt); }
  S.players.forEach(p=>{
    const r = restById(p.restaurant);
    add(r?r.name:"?", `${esc(p.main||"")} – <b>${esc(p.name)}</b>`);
    if(p.starter) add(p.starterRest||"?", `${esc(p.starter)} (förrätt) – <b>${esc(p.name)}</b>`);
    if(p.dessert) add(p.dessertRest||"?", `${esc(p.dessert)} (efterrätt) – <b>${esc(p.name)}</b>`);
  });
  const orderHtml = Object.entries(orders).map(([rest,items])=>`
    <div class="order-group">
      <div class="rname">🛒 ${esc(rest)}</div>
      <ul>${items.map(i=>`<li>• ${i}</li>`).join("")}</ul>
    </div>`).join("");

  stage.innerHTML = `
  <div class="panel">
    <h2>🍖 Valhallas Festbord 🍺</h2>
    <p class="lead">Ödet har talat. Ingen ånger, inga byten – bara ära.</p>
    ${personHtml}
    <h2 style="margin-top:24px">Beställningslista per restaurang</h2>
    <p class="lead" style="font-size:13.5px">Öppna Foodora/Wolt och beställ rakt av listan nedan.</p>
    ${orderHtml}
    <div class="center" style="margin-top:16px">
      <button class="btn blood" id="againBtn">🔄 Kör en ny saga</button>
    </div>
  </div>`;
  horn(); confettiBurst();
  document.getElementById("againBtn").onclick=()=>{
    if(confirm("Nollställa lottningen och börja om? (Era redigerade menyer behålls)")){
      const rests = S.restaurants, act = S.active, snd = S.sound;
      S = freshState(); S.restaurants=rests; S.active=act; S.sound=snd;
      save(); render();
    }
  };
}

/* =====================================================
   FOOTER TOOLS
===================================================== */
document.getElementById("resetBtn").onclick=()=>{
  if(confirm("Börja om helt från början? (Även redigerade menyer nollställs)")){
    S = freshState(); save(); render();
  }
};
const soundBtn = document.getElementById("soundBtn");
function paintSound(){ soundBtn.textContent = S.sound? "🔊 Ljud":"🔇 Ljud"; }
soundBtn.onclick=()=>{ S.sound=!S.sound; save(); paintSound(); };
paintSound();

let resizeT=null;
window.addEventListener("resize", ()=>{
  clearTimeout(resizeT);
  resizeT=setTimeout(()=>{ const c=document.getElementById("wheel"); if(c && !wheelAnim){ render(); } },200);
});

render();
</script>
</body>
</html>
